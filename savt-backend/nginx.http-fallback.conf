# ПЕРЕХОДНЫЙ конфиг: порт 443 снаружи ещё не проброшен, поэтому
# порт 80 продолжает обслуживать API (как раньше), а HTTPS уже включён
# и заработает автоматически после проброса 443.
# Включается строкой NGINX_CONF=nginx.http-fallback.conf в .env (см. README).
# После проброса 443 удалить эту строку из .env и пересоздать nginx —
# тогда порт 80 станет редиректом на HTTPS (nginx.conf).

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;

    client_max_body_size 500M;

    proxy_connect_timeout 60s;
    proxy_read_timeout    120s;
    proxy_send_timeout    60s;

    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:20m  rate=100r/m;

    # WebSocket upgrade: "upgrade" только если клиент реально его запросил,
    # иначе "close" — иначе обычные (не-WS) запросы на /user-events/ticket
    # получат некорректную пару Upgrade/Connection на апстрим
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # HTTP: временно полноценно обслуживает API (443 снаружи не проброшен)
    server {
        listen 80;
        server_name helper.savt.by _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        add_header X-Frame-Options          "DENY"            always;
        add_header X-Content-Type-Options   "nosniff"         always;
        add_header X-XSS-Protection         "1; mode=block"   always;
        add_header Referrer-Policy          "no-referrer"     always;

        location ~ ^/auth/(login|admin-login|register/start|register/resend|password-reset) {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://api:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /static/files/ {
            alias /uploads/files/;
            default_type application/octet-stream;
            add_header Content-Disposition      "attachment" always;
            add_header X-Content-Type-Options   "nosniff"    always;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        location /static/ {
            alias /uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # SSE-стрим операторской панели — буферизация должна быть выключена,
        # иначе nginx копит ответ и события приходят не в реальном времени
        location /operator/events/ {
            proxy_pass         http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        '';
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 1h;
            # gzip требует накопить блок сжатия перед флашем — для
            # никогда не закрывающегося SSE-соединения буфер так и не
            # наполнится, события до клиента не дойдут вообще, даже
            # с proxy_buffering off. Не полагаемся на то, что
            # gzip_proxied по умолчанию off — выключаем явно.
            gzip off;
        }

        # WebSocket-стрим для мобильного/пользовательского приложения — тот же
        # смысл, что и /operator/events/ выше, но канал персональный (свои чаты)
        location /user-events/ {
            proxy_pass         http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 1h;
        }

        location / {
            limit_req zone=api burst=30 nodelay;
            limit_req_status 429;

            proxy_pass         http://api:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_request_buffering off;
        }
    }

    # HTTPS: уже работает внутри, снаружи заработает после проброса 443
    server {
        listen 443 ssl;
        http2 on;
        server_name helper.savt.by;

        ssl_certificate     /etc/letsencrypt/live/helper.savt.by/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/helper.savt.by/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1h;

        add_header X-Frame-Options          "DENY"            always;
        add_header X-Content-Type-Options   "nosniff"         always;
        add_header X-XSS-Protection         "1; mode=block"   always;
        add_header Referrer-Policy          "no-referrer"     always;

        location ~ ^/auth/(login|admin-login|register/start|register/resend|password-reset) {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://api:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /static/files/ {
            alias /uploads/files/;
            default_type application/octet-stream;
            add_header Content-Disposition      "attachment" always;
            add_header X-Content-Type-Options   "nosniff"    always;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        location /static/ {
            alias /uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # SSE-стрим операторской панели — буферизация должна быть выключена,
        # иначе nginx копит ответ и события приходят не в реальном времени
        location /operator/events/ {
            proxy_pass         http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        '';
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 1h;
            # gzip требует накопить блок сжатия перед флашем — для
            # никогда не закрывающегося SSE-соединения буфер так и не
            # наполнится, события до клиента не дойдут вообще, даже
            # с proxy_buffering off. Не полагаемся на то, что
            # gzip_proxied по умолчанию off — выключаем явно.
            gzip off;
        }

        # WebSocket-стрим для мобильного/пользовательского приложения — тот же
        # смысл, что и /operator/events/ выше, но канал персональный (свои чаты)
        location /user-events/ {
            proxy_pass         http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 1h;
        }

        location / {
            limit_req zone=api burst=30 nodelay;
            limit_req_status 429;

            proxy_pass         http://api:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_request_buffering off;
        }
    }

    server {
        listen 8080;

        server_name helper.savt.by;

        # Next.js rewrites() (см. next.config.js, /backend/:path* → API) не умеют
        # стримить долгоживущие ответы: SSE у него полностью буферизуется до
        # закрытия соединения, а WebSocket-upgrade он вообще не проксирует.
        # Поэтому эти два пути пускаем в API напрямую, в обход фронтенда —
        # rewrite снимает префикс /backend/, который добавляет сам фронтенд.
        location /backend/operator/events/ {
            rewrite            ^/backend/(.*)$ /$1 break;
            proxy_pass         http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        '';
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 1h;
            gzip off;
        }

        location /backend/user-events/ {
            rewrite            ^/backend/(.*)$ /$1 break;
            proxy_pass         http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 1h;
        }

        location / {

            proxy_pass         http://savt-assist-frontend:3000;

            proxy_set_header   Host              $host;

            proxy_set_header   X-Real-IP         $remote_addr;

            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            proxy_set_header   X-Forwarded-Proto $scheme;

        }

    }
}
