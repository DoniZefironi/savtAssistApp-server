# DEV-конфиг: без TLS, только для локальной разработки
# (подключается через docker-compose.dev.yml). В проде — nginx.conf.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Скрыть версию Nginx из заголовков
    server_tokens off;

    # Сжатие
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;

    # Лимит размера загружаемых файлов (500 МБ — максимум из upload_service)
    client_max_body_size 500M;

    # Таймауты
    proxy_connect_timeout 60s;
    proxy_read_timeout    120s;
    proxy_send_timeout    60s;

    # Rate limiting на уровне Nginx — защита от DDoS
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:20m  rate=100r/m;

    # WebSocket upgrade: "upgrade" только если клиент реально его запросил,
    # иначе "close" — иначе обычные (не-WS) запросы на /user-events/ticket
    # получат некорректную пару Upgrade/Connection на апстрим
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options          "DENY"            always;
        add_header X-Content-Type-Options   "nosniff"         always;
        add_header X-XSS-Protection         "1; mode=block"   always;
        add_header Referrer-Policy          "no-referrer"     always;

        # Auth эндпоинты — строгий лимит (burst=5 — допускает небольшой всплеск)
        location ~ ^/auth/(login|admin-login|register/start|register/resend|password-reset) {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://api:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Файлы неизвестных типов — только скачивание (см. nginx.conf)
        location /static/files/ {
            alias /uploads/files/;
            default_type application/octet-stream;
            add_header Content-Disposition      "attachment" always;
            add_header X-Content-Type-Options   "nosniff"    always;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Статические файлы (uploads) — отдаём напрямую через Nginx, минуя FastAPI
        location /static/ {
            alias /uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # SSE-стрим операторской панели — буферизация должна быть выключена,
        # иначе nginx копит ответ и события приходят не в реальном времени
        location /operator/events/ {
            proxy_pass         http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        '';
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 1h;
            # gzip требует накопить блок сжатия перед флашем — для
            # никогда не закрывающегося SSE-соединения буфер так и не
            # наполнится, события до клиента не дойдут вообще, даже
            # с proxy_buffering off. Не полагаемся на то, что
            # gzip_proxied по умолчанию off — выключаем явно.
            gzip off;
        }

        # WebSocket-стрим для мобильного/пользовательского приложения — тот же
        # смысл, что и /operator/events/ выше, но канал персональный (свои чаты)
        location /user-events/ {
            proxy_pass         http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 1h;
        }

        # Все остальные запросы
        location / {
            limit_req zone=api burst=30 nodelay;
            limit_req_status 429;

            proxy_pass         http://api:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Для загрузки файлов
            proxy_request_buffering off;
        }
    }
}
