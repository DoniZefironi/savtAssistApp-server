# Продакшн-конфигурация. Для локальной разработки:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    # Порт БД не торчит наружу — только внутри Docker-сети
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    # Порт 8000 не открываем наружу — только через Nginx.
    # Код НЕ монтируем: в проде работает копия из образа (см. Dockerfile).
    volumes:
      - ./uploads:/code/uploads
      - ./firebase-credentials.json:/code/firebase-credentials.json:ro
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./uploads:/uploads:ro
      # Сертификаты Let's Encrypt (получить certbot-ом на хосте, см. README)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Webroot для продления сертификатов (certbot renew --webroot)
      - ./certbot-www:/var/www/certbot:ro
    depends_on:
      - api
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
