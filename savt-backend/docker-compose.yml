services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./uploads:/code/uploads
      - ./firebase-credentials.json:/code/firebase-credentials.json:ro
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      # NGINX_CONF задаётся в .env: по умолчанию боевой nginx.conf (HTTPS + редирект),
      # nginx.http-fallback.conf — пока порт 443 снаружи не проброшен
      - ./${NGINX_CONF:-nginx.conf}:/etc/nginx/nginx.conf:ro
      - ./uploads:/uploads:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot-www:/var/www/certbot:ro
    depends_on:
      - api
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
