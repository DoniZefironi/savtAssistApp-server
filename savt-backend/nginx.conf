worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Скрыть версию Nginx из заголовков
    server_tokens off;

    # Сжатие
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;

    # Лимит размера загружаемых файлов (500 МБ — максимум из upload_service)
    client_max_body_size 500M;

    # Таймауты
    proxy_connect_timeout 60s;
    proxy_read_timeout    120s;
    proxy_send_timeout    60s;

    # Rate limiting на уровне Nginx — защита от DDoS
    # Зона login: строгий лимит для auth-эндпоинтов
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    # Зона api: общий лимит
    limit_req_zone $binary_remote_addr zone=api:20m  rate=100r/m;

    # HTTP: только ACME-челленджи для продления сертификата + редирект на HTTPS
    server {
        listen 80;
        server_name helper.savt.by;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name helper.savt.by;

        ssl_certificate     /etc/letsencrypt/live/helper.savt.by/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/helper.savt.by/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1h;

        # Security headers
        add_header X-Frame-Options          "DENY"            always;
        add_header X-Content-Type-Options   "nosniff"         always;
        add_header X-XSS-Protection         "1; mode=block"   always;
        add_header Referrer-Policy          "no-referrer"     always;
        add_header Strict-Transport-Security "max-age=31536000" always;

        # Auth эндпоинты — строгий лимит (burst=5 — допускает небольшой всплеск)
        location ~ ^/auth/(login|admin-login|register/start|register/resend|password-reset) {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://api:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Файлы неизвестных типов — только скачивание, никогда не рендерим
        # в браузере (защита от загрузки HTML/SVG и stored XSS на нашем домене)
        location /static/files/ {
            alias /uploads/files/;
            default_type application/octet-stream;
            add_header Content-Disposition      "attachment" always;
            add_header X-Content-Type-Options   "nosniff"    always;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Статические файлы (uploads) — отдаём напрямую через Nginx, минуя FastAPI
        location /static/ {
            alias /uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Все остальные запросы
        location / {
            limit_req zone=api burst=30 nodelay;
            limit_req_status 429;

            proxy_pass         http://api:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Для загрузки файлов
            proxy_request_buffering off;
        }
    }
}




